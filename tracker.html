<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syllabus Tracker</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --primary: #3b82f6;
            --danger: #ef4444;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 16px;
            padding-bottom: 80px;
        }

        header {
            margin-bottom: 20px;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 4px;
        }

        .global-progress {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .btn {
            padding: 6px 12px;
            border-radius: 6px;
            border: none;
            font-size: 0.85rem;
            cursor: pointer;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-sm { padding: 4px 8px; font-size: 0.75rem; }

        .tree-node {
            margin-left: 12px;
            border-left: 2px solid var(--border-color);
            padding-left: 8px;
        }

        .tree-node.level-0 { margin-left: 0; border-left: none; padding-left: 0; }

        .node-row {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px;
            margin-top: 6px;
            margin-bottom: 6px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .node-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .node-info {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-grow: 1;
            cursor: pointer;
            overflow: hidden;
        }

        .toggle-icon {
            font-size: 0.8rem;
            color: var(--text-muted);
            width: 14px;
            text-align: center;
        }

        .node-title {
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .level-0 > .node-row .node-title { font-size: 1.1rem; color: #0f172a; }
        .level-1 > .node-row .node-title { font-size: 1rem; }
        .level-2 > .node-row .node-title { font-size: 0.95rem; font-weight: 500; }
        .level-3 > .node-row .node-title { font-size: 0.9rem; font-weight: 400; }

        .badge {
            font-size: 0.75rem;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 600;
            white-space: nowrap;
        }
        
        /* Colored badge styles per requirement */
        .badge-most-important { background: #fee2e2; color: #dc2626; border: 1px solid #fca5a5; }
        .badge-important { background: #ffedd5; color: #ea580c; border: 1px solid #fed7aa; }
        .badge-normal { background: #fef9c3; color: #ca8a04; border: 1px solid #fef08a; }
        .badge-less-important { background: #dcfce7; color: #16a34a; border: 1px solid #bbf7d0; }
        .badge-unimportant { background: #f1f5f9; color: #475569; border: 1px solid #cbd5e1; }

        .importance-select {
            font-size: 0.75rem;
            padding: 2px 4px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            background: #ffffff;
            color: var(--text-main);
            outline: none;
        }

        .progress-text {
            font-size: 0.75rem;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .node-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: flex-end;
            border-top: 1px solid #f1f5f9;
            padding-top: 6px;
        }

        .children-container {
            display: none;
        }

        .children-container.expanded {
            display: block;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
        }

        input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .fab {
            position: fixed;
            bottom: 20px;
            right: 20px;
            border-radius: 50%;
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            z-index: 100;
        }
    </style>
</head>
<body>

    <header>
        <h1>Syllabus Tracker</h1>
        <div class="global-progress" id="globalProgress">Overall Progress: 0%</div>
    </header>

    <div id="treeRoot"></div>

    <button class="btn btn-primary fab" onclick="addNode('root', 0)" title="Add Subject">+</button>

    <script>
        const LEVELS = ["Subject", "Chapter", "Topic", "Subtopic"];
        
        let syllabusData = JSON.parse(localStorage.getItem('syllabus_data')) || [];

        function saveData() {
            localStorage.setItem('syllabus_data', JSON.stringify(syllabusData));
            calculateProgress(syllabusData);
            renderTree();
        }

        function findNodeById(nodes, id) {
            for (let node of nodes) {
                if (node.id === id) return node;
                if (node.children) {
                    let found = findNodeById(node.children, id);
                    if (found) return found;
                }
            }
            return null;
        }

        function deleteNodeById(nodes, id) {
            for (let i = 0; i < nodes.length; i++) {
                if (nodes[i].id === id) {
                    nodes.splice(i, 1);
                    return true;
                }
                if (nodes[i].children) {
                    let deleted = deleteNodeById(nodes[i].children, id);
                    if (deleted) return true;
                }
            }
            return false;
        }

        function generateId() {
            return '_' + Math.random().toString(36).substr(2, 9);
        }

        function addNode(parentId, currentLevel) {
            const title = prompt(`Enter ${LEVELS[currentLevel]} Name:`);
            if (!title || !title.trim()) return;

            const newNode = {
                id: generateId(),
                title: title.trim(),
                level: currentLevel,
                expanded: true,
                importance: "Normal", // Default assignment
                completed: false,
                children: []
            };

            if (parentId === 'root') {
                syllabusData.push(newNode);
            } else {
                const parentNode = findNodeById(syllabusData, parentId);
                if (parentNode) parentNode.children.push(newNode);
            }
            saveData();
        }

        function editNode(id) {
            const node = findNodeById(syllabusData, id);
            if (!node) return;

            const newTitle = prompt(`Edit ${LEVELS[node.level]} Name:`, node.title);
            if (newTitle && newTitle.trim()) {
                node.title = newTitle.trim();
            }
            saveData();
        }

        function deleteNode(id) {
            if (confirm("Are you sure you want to delete this item and all its sub-items?")) {
                deleteNodeById(syllabusData, id);
                saveData();
            }
        }

        function toggleExpand(id, event) {
            event.stopPropagation();
            const node = findNodeById(syllabusData, id);
            if (node) {
                node.expanded = !node.expanded;
                saveData();
            }
        }

        function toggleComplete(id, checked) {
            const node = findNodeById(syllabusData, id);
            if (node) {
                node.completed = checked;
                saveData();
            }
        }

        // Change handler triggered by dropdown interaction
        function changeImportance(id, value) {
            const node = findNodeById(syllabusData, id);
            if (node) {
                node.importance = value;
                saveData();
            }
        }

        // Returns CSS class slug matching requirement values
        function getImportanceClassToken(str) {
            if(!str) return 'normal';
            return str.toLowerCase().replace(/\s+/g, '-');
        }

        function calculateProgress(nodes) {
            let totalSubtopics = 0;
            let completedSubtopics = 0;

            function traverse(nodeList) {
                nodeList.forEach(node => {
                    if (node.level === 3) {
                        totalSubtopics++;
                        if (node.completed) completedSubtopics++;
                    } else {
                        if (node.children && node.children.length > 0) {
                            traverse(node.children);
                            const subtopicLeaves = getLeavesCount(node);
                            node.totalLeaves = subtopicLeaves.total;
                            node.completedLeaves = subtopicLeaves.completed;
                            node.progressPercent = subtopicLeaves.total > 0 ? Math.round((subtopicLeaves.completed / subtopicLeaves.total) * 100) : 0;
                            node.completed = subtopicLeaves.total > 0 && subtopicLeaves.completed === subtopicLeaves.total;
                        } else {
                            node.totalLeaves = 0;
                            node.completedLeaves = 0;
                            node.progressPercent = 0;
                            node.completed = false;
                        }
                    }
                });
            }

            function getLeavesCount(parentNode) {
                let total = 0;
                let completed = 0;
                function deepCount(n) {
                    if (n.level === 3) {
                        total++;
                        if (n.completed) completed++;
                    } else if (n.children) {
                        n.children.forEach(deepCount);
                    }
                }
                deepCount(parentNode);
                return { total, completed };
            }

            traverse(nodes);

            const globalPct = totalSubtopics > 0 ? Math.round((completedSubtopics / totalSubtopics) * 100) : 0;
            document.getElementById('globalProgress').innerText = `Overall Progress: ${globalPct}% (${completedSubtopics}/${totalSubtopics} Subtopics)`;
        }

        function buildTreeHTML(nodes) {
            let html = '';
            nodes.forEach(node => {
                const hasChildren = node.children && node.children.length > 0;
                const toggleSymbol = hasChildren ? (node.expanded ? '▼' : '▶') : '•';
                
                let progressDisplay = '';
                if (node.level < 3) {
                    progressDisplay = `<span class="progress-text">${node.progressPercent || 0}% Done</span>`;
                }

                let statusActionMarkup = '';
                if (node.level === 3) {
                    statusActionMarkup = `
                        <div class="checkbox-container">
                            <input type="checkbox" ${node.completed ? 'checked' : ''} onchange="toggleComplete('${node.id}', this.checked)">
                        </div>
                    `;
                }

                // Add Importance Badge for both Topic (level 2) and Subtopic (level 3)
                let importanceMarkup = '';
                if (node.level === 2 || node.level === 3) {
                    const currentImp = node.importance || "Normal";
                    const classToken = getImportanceClassToken(currentImp);
                    importanceMarkup = `<span class="badge badge-${classToken}">${currentImp}</span>`;
                }

                // Add Importance Selector Dropdown for both Topic (level 2) and Subtopic (level 3)
                let dropdownMarkup = '';
                if (node.level === 2 || node.level === 3) {
                    const currentImp = node.importance || "Normal";
                    dropdownMarkup = `
                        <select class="importance-select" onchange="changeImportance('${node.id}', this.value)">
                            <option value="Most Important" ${currentImp === 'Most Important' ? 'selected' : ''}>Most Important</option>
                            <option value="Important" ${currentImp === 'Important' ? 'selected' : ''}>Important</option>
                            <option value="Normal" ${currentImp === 'Normal' ? 'selected' : ''}>Normal</option>
                            <option value="Less Important" ${currentImp === 'Less Important' ? 'selected' : ''}>Less Important</option>
                            <option value="Unimportant" ${currentImp === 'Unimportant' ? 'selected' : ''}>Unimportant</option>
                        </select>
                    `;
                }

                html += `
                    <div class="tree-node level-${node.level}">
                        <div class="node-row">
                            <div class="node-header">
                                <div class="node-info" onclick="toggleExpand('${node.id}', event)">
                                    <span class="toggle-icon">${toggleSymbol}</span>
                                    <span class="node-title">${node.title}</span>
                                    ${importanceMarkup}
                                    ${progressDisplay}
                                </div>
                                ${statusActionMarkup}
                            </div>
                            <div class="node-actions">
                                ${dropdownMarkup}
                                ${node.level < 3 ? `<button class="btn btn-primary btn-sm" onclick="addNode('${node.id}', ${node.level + 1})">+ Add ${LEVELS[node.level + 1]}</button>` : ''}
                                <button class="btn btn-sm" style="background:#e2e8f0;" onclick="editNode('${node.id}')">Edit</button>
                                <button class="btn btn-danger btn-sm" onclick="deleteNode('${node.id}')">Del</button>
                            </div>
                        </div>
                        <div class="children-container ${node.expanded ? 'expanded' : ''}">
                            ${hasChildren ? buildTreeHTML(node.children) : ''}
                        </div>
                    </div>
                `;
            });
            return html;
        }

        function renderTree() {
            const rootContainer = document.getElementById('treeRoot');
            if (syllabusData.length === 0) {
                rootContainer.innerHTML = '<p style="text-align:center; color:var(--text-muted); margin-top:40px;">No subjects added yet. Tap the blue button below to begin.</p>';
                return;
            }
            rootContainer.innerHTML = buildTreeHTML(syllabusData);
        }

        // Initialize App
        calculateProgress(syllabusData);
        renderTree();
    </script>
</body>
</html>
